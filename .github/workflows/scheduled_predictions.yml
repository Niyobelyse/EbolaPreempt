name: Scheduled Predictions

on:
  schedule:
    - cron: "0 18 * * *"    # 18:00 UTC = 20:00 CAT daily
  workflow_dispatch:          # also allows manual trigger from GitHub Actions UI

jobs:
  run-predictions:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up backend (cold start)
        run: |
          echo "Pinging backend to wake it from sleep..."
          curl -s --max-time 60 https://ebolapreempt.onrender.com/ || true
          sleep 20

      - name: Get JWT token
        id: auth
        run: |
          RESPONSE=$(curl -s --max-time 60 -X POST https://ebolapreempt.onrender.com/api/token/ \
            -H "Content-Type: application/json" \
            -d '{"username":"admin","password":"${{ secrets.DJANGO_ADMIN_PASSWORD }}"}')
          TOKEN=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['access'])")
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Sync latest WHO regional-risk data
        run: |
          set -o pipefail
          curl --fail-with-body -s --max-time 60 -X POST https://ebolapreempt.onrender.com/api/records/sync-live/ \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -H "Content-Type: application/json" \
            | python3 -m json.tool

      - name: Run predictions for all districts
        run: |
          set -o pipefail
          curl --fail-with-body -s --max-time 120 -X POST https://ebolapreempt.onrender.com/api/predictions/run-all/ \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -H "Content-Type: application/json" \
            | python3 -m json.tool
