services:
  - type: web
    name: ebolapreempt-api
    env: python
    rootDir: backend
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn ebolapreempt.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        sync: false          # paste your Neon connection string here in the Render dashboard
      - key: ALLOWED_HOSTS
        sync: false          # set to your-app-name.onrender.com after first deploy
      - key: CORS_ALLOWED_ORIGINS
        sync: false          # set to https://your-app.vercel.app after frontend deploy
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@ebolapreempt.com
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false          # set a strong password in the Render dashboard
