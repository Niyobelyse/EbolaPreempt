services:
  - type: web
    name: ebolapreempt-api
    env: python
    rootDir: backend
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn ebolapreempt.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        sync: false          # paste your Neon connection string here in the Render dashboard
      - key: ALLOWED_HOSTS
        sync: false          # set to your-app-name.onrender.com after first deploy
      - key: CORS_ALLOWED_ORIGINS
        sync: false          # https://ebolapreempt-1.onrender.com
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@ebolapreempt.com
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false          # set a strong password in the Render dashboard

  - type: cron
    name: ebolapreempt-predictions-cron
    env: python
    rootDir: backend
    buildCommand: chmod +x build.sh && ./build.sh
    schedule: "20 17 * * *"  # 17:20 UTC = 19:20 CAT daily
    startCommand: python manage.py run_scheduled_predictions
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
